name: Wallet
options:
  bundleIdPrefix: com.kevinthau
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  projectFormat: xcode15_0

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO

targets:
  Wallet:
    type: application
    platform: iOS
    sources:
      - Wallet
    settings:
      base:
        INFOPLIST_FILE: Wallet/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinthau.wallet
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "3JXY2MS2Y3"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Wallet/WalletDebug.entitlements
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_ENTITLEMENTS: Wallet/Wallet.entitlements
          CODE_SIGN_IDENTITY: Apple Distribution

  WalletTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WalletTests
    dependencies:
      - target: Wallet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinthau.wallet.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Wallet:
    shared: true
    build:
      targets:
        Wallet: all
        WalletTests: [test]
    test:
      targets:
        - WalletTests
